<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>OneSignal Translator</title>
    <style>
      body {
        width: 260px;
        margin: 0;
        padding: 14px 16px 16px;
        font: 13px/1.45 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        color: #1f2937;
      }
      h3 {
        margin: 0 0 10px;
        font-size: 14px;
        font-weight: 600;
      }
      label {
        display: block;
        font-size: 12px;
        color: #4b5563;
        margin-bottom: 6px;
      }
      select {
        width: 100%;
        padding: 6px 8px;
        font-size: 13px;
        border: 1px solid #d1d5db;
        border-radius: 4px;
        background: #fff;
      }
      #status {
        margin: 10px 0 0;
        font-size: 11px;
        color: #6b7280;
        min-height: 14px;
      }
      .divider {
        margin: 14px 0 10px;
        border: 0;
        border-top: 1px solid #e5e7eb;
      }
      #feedback {
        display: block;
        width: 100%;
        padding: 7px 8px;
        font-size: 12px;
        color: #1f2937;
        background: #f9fafb;
        border: 1px solid #d1d5db;
        border-radius: 4px;
        cursor: pointer;
        text-align: center;
      }
      #feedback:hover {
        background: #f3f4f6;
      }
      .hint {
        margin: 8px 0 0;
        font-size: 11px;
        color: #6b7280;
        line-height: 1.5;
      }
      #disclosure {
        display: none;
        margin: 0 0 12px;
        padding: 10px;
        font-size: 12px;
        line-height: 1.45;
        color: #1e3a8a;
        background: #eff6ff;
        border: 1px solid #bfdbfe;
        border-radius: 4px;
      }
      #disclosure p {
        margin: 0 0 8px;
      }
      #disclosure button {
        padding: 4px 10px;
        font-size: 11px;
        background: #2563eb;
        color: #fff;
        border: 0;
        border-radius: 3px;
        cursor: pointer;
      }
      .optin-row {
        display: flex;
        align-items: flex-start;
        gap: 6px;
        margin: 0 0 6px;
      }
      .optin-row input[type="checkbox"] {
        margin-top: 2px;
      }
      .optin-row label {
        margin: 0;
        font-size: 12px;
        color: #1f2937;
        cursor: pointer;
      }
      #queue-link {
        display: inline-block;
        margin-top: 4px;
        font-size: 11px;
        color: #2563eb;
        text-decoration: none;
        cursor: pointer;
      }
      #queue-link:hover {
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <h3>OneSignal Translator</h3>

    <div id="disclosure">
      <p data-i18n="disclosure_body">
        This extension shares a list of dashboard strings that weren't
        translated so coverage can improve. No URLs, user IDs, or personal
        data are sent.
      </p>
      <button id="disclosure-dismiss" type="button" data-i18n="disclosure_dismiss">Got it</button>
    </div>

    <label for="lang" data-i18n="language_label">Language</label>
    <select id="lang">
      <option value="en">English (off)</option>
    </select>
    <p id="status"></p>

    <hr class="divider" />

    <div class="optin-row">
      <input id="ledger-optin" type="checkbox" />
      <label for="ledger-optin" data-i18n="optin_label">Help improve translations (share anonymized untranslated strings)</label>
    </div>
    <a id="queue-link" href="#" data-i18n="queue_link">View what's queued →</a>

    <hr class="divider" />

    <button id="feedback" type="button" data-i18n="feedback_btn">Report a translation issue</button>
    <p class="hint" data-i18n="hint">
      Tip: right-click any translated text on the dashboard to suggest a
      fix for that specific string.
    </p>
    <script src="popup.js"></script>
  </body>
</html>
